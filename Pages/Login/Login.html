<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hey Vaquero</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="Login.css">
</head>
<body>

    <video autoplay muted loop class="video-bg">
        <source src="img/mty.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="login-card" id="login-card">
        <img src="img/LOGO1.png" class="logo">
        <h1>¡Qué Onda!</h1>
        <div class="input-box">
            <input type="text" placeholder="Correo">
            <i class='bx bxs-user'></i>
        </div>
        <div class="input-box">
            <input type="password" placeholder="Contraseña">
            <i class='bx bxs-lock-alt'></i>
        </div>
        <button class="login-btn">Entrar <i class='bx bx-right-arrow-alt'></i></button>
        
        <div class="register-link">
            <p>¿No tienes cuenta? <a href="#" onclick="toggleCards()">Regístrate aquí</a></p>
        </div>

        <p class="social-text">o entra con</p>
        <div class="social-icons">
            <i class='bx bxl-google'></i>
            <i class='bx bxl-apple'></i>
            <i class='bx bxl-facebook'></i>
        </div>
    </div>

   <div class="login-card" id="register-card" style="display: none;">
    <img src="img/LOGO1.png" class="logo">
    <h1>Crea tu cuenta</h1>
    
    <div class="profile-upload-container">
    <div class="profile-upload" onclick="document.getElementById('reg-foto').click()">
        <img id="profile-preview" src="" alt="" style="display: none;">
        <i class='bx bxs-camera' id="camera-icon"></i>
        <span id="upload-text">Subir foto</span>
    </div>
    <input type="file" id="reg-foto" accept="image/*" onchange="previewImage(this)" style="display: none;">
</div>

    <div class="input-row">
        <div class="input-box">
            <input type="text" id="reg-nombre" placeholder="Nombre(s)">
            <i class='bx bxs-user'></i>
        </div>
        <div class="input-box">
            <input type="text" id="reg-apellidos" placeholder="Apellidos">
            <i class='bx bxs-user-detail'></i>
        </div>
    </div>

    <div class="input-row">
        <div class="input-box">
            <input type="number" id="reg-edad" placeholder="Edad">
            <i class='bx bxs-cake'></i>
        </div>
        <div class="input-box">
            <input type="date" id="reg-nacimiento" placeholder="Nacimiento">
        </div>
    </div>

    <div class="input-row">
        <div class="input-box">
            <input type="text" id="reg-pais" placeholder="País">
            <i class='bx bxs-flag'></i>
        </div>
        <div class="input-box">
            <select id="reg-sexo" style="width: 100%; background: transparent; border: none; border-bottom: 2px solid rgba(255,255,255,0.2); color: #ccc; outline: none; padding: 12px 0;">
                <option value="" disabled selected>Sexo</option>
                <option value="H">Hombre</option>
                <option value="M">Mujer</option>
                <option value="O">Otro</option>
            </select>
        </div>
    </div>

    <div class="input-box">
        <input type="email" id="reg-correo" placeholder="Correo Electrónico">
        <i class='bx bxs-envelope'></i>
    </div>
    <div class="input-box">
        <input type="password" id="reg-pass" placeholder="Contraseña">
        <i class='bx bxs-lock-alt'></i>
    </div>
    
    <button class="login-btn">Registrarse <i class='bx bx-check-circle'></i></button>
    
    <div class="register-link">
        <p>¿Ya tienes cuenta? <a href="#" onclick="toggleCards()">Inicia sesión</a></p>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
