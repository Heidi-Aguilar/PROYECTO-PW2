<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Hey Vaquero</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="Perfil.css">
</head>
<body>
    <div class="profile-bg"></div>

    <div class="container-profile">
        <a href="../Pagina-Principal/index.html" class="back-link">
            <i class='bx bx-left-arrow-alt'></i> Volver al inicio
        </a>
        <div class="profile-card-horizontal">
            
            <div class="card-left">
                <div class="avatar-container">
                    <img src="img/LOGOC.png" alt="Perfil" id="display-photo">
                    <label for="input-photo" class="edit-icon"><i class='bx bxs-camera'></i></label>
                    <input type="file" id="input-photo" hidden>
                </div>
                
                <button class="btn-change-pass" id="openModal">Cambiar contraseña</button>

                <button class="btn-logout" id="logoutBtn" style="margin-top: 10px; background: #ff4d4d; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold;">
                    <i class='bx bx-log-out'></i> Cerrar Sesión
                </button>
                
                <div id="admin-zone" style="margin-top: 15px; width: 100%;"></div>
            </div>
            
            <div class="card-right">
                <div class="brand-header">
                    <img src="img/logo.png" alt="Hey Vaquero">
                </div>
                
                <h2 class="user-fullname" id="display-name">Cargando...</h2>
                    
                <div class="info-grid">
                    <div class="field">
                        <span class="label">País</span>
                        <p class="value" id="display-country">México</p>
                    </div>
                    <div class="field">
                        <span class="label">Fecha de nacimiento</span>
                        <p class="value" id="display-dob">12 de Octubre, 2001</p>
                    </div>
                    <div class="field full">
                        <span class="label">Correo electrónico</span>
                        <p class="value" id="display-email">ejemplo@vaquero.com</p>
                    </div>
                    <div class="field full">
                        <span class="label">Teléfono</span>
                        <p class="value">+52 81 1234 5678</p>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <div class="modal" id="passModal">
        <div class="modal-box">
            <h3>Actualizar Seguridad</h3>
            <input type="password" id="newPassword" placeholder="Nueva contraseña" class="mod-input">
            <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" class="mod-input">
            <div class="mod-btns">
                <button class="btn-save" onclick="saveNewPass()">Guardar</button>
                <button class="btn-close" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="perfil.js"></script>
</body>
</html>
